<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sexagem de Pinguins-de-Magalhães</title>
    <!-- Carregando Tailwind CSS para o visual -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .gradient-bg { background: linear-gradient(135deg, #0284c7, #2563eb); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden border border-gray-100">
        <!-- Header -->
        <div class="gradient-bg p-6 text-white text-center">
            <h1 class="text-2xl font-bold mb-1">Calculadora de Sexagem</h1>
            <p class="text-sm text-blue-100 italic">Spheniscus magellanicus (PMP-BS / R3 Animal)</p>
        </div>

        <!-- Formulário -->
        <div class="p-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Comprimento do Bico (cm)</label>
                    <input type="number" id="bicoComp" step="0.01" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" placeholder="Ex: 5.35">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Altura do Bico - Narinas (cm)</label>
                    <input type="number" id="bicoAlt" step="0.01" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" placeholder="Ex: 1.98">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Largura do Bico (cm)</label>
                    <input type="number" id="bicoLarg" step="0.01" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" placeholder="Ex: 1.40">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Comprimento Total da Asa (cm)</label>
                    <input type="number" id="asaTotal" step="0.1" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" placeholder="Ex: 18.5">
                </div>
            </div>

            <button onclick="calcularSexagem()" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all active:scale-95">
                GERAR LAUDO CLÍNICO
            </button>

            <!-- Resultados -->
            <div id="resultBox" class="mt-6 p-5 rounded-lg border-2 hidden text-center transition-all">
                <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wide mb-1">Resultado da Análise</h2>
                <div id="classification" class="text-3xl font-black mb-2"></div>
                <div class="flex justify-center items-center space-x-2">
                    <span class="text-gray-600 text-sm">Probabilidade de ser Macho:</span>
                    <span id="probabilidade" class="font-bold text-lg"></span>
                </div>
                <p id="aviso" class="text-xs mt-3 font-medium px-2 py-1 rounded hidden"></p>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="bg-gray-50 p-4 text-center border-t border-gray-100">
            <p class="text-xs text-gray-400">Modelo de Regressão Ponderada (AUC = 0.831)<br>Logit = -26.15 + 2.95(C_Bico) + 2.40(A_Bico) - 0.49(L_Bico) + 0.34(Asa)<br><span class="italic text-gray-500">Limiares de Segurança: < 45% (Fêmea) | > 55% (Macho)</span></p>
        </div>
    </div>

    <script>
        function calcularSexagem() {
            // Captura de valores inseridos pelo usuário
            const bicoComp = parseFloat(document.getElementById('bicoComp').value);
            const bicoAlt = parseFloat(document.getElementById('bicoAlt').value);
            const bicoLarg = parseFloat(document.getElementById('bicoLarg').value);
            const asaTotal = parseFloat(document.getElementById('asaTotal').value);

            // Validação de entrada
            if (isNaN(bicoComp) || isNaN(bicoAlt) || isNaN(bicoLarg) || isNaN(asaTotal)) {
                alert("Por favor, preencha todas as 4 medidas biométricas.");
                return;
            }

            // Equação Logística Preditiva do estudo
            const logit = -26.15 + (2.95 * bicoComp) + (2.40 * bicoAlt) - (0.49 * bicoLarg) + (0.34 * asaTotal);
            
            // Conversão de Logit para Probabilidade (0 a 1)
            const probabilidade = 1 / (1 + Math.exp(-logit));
            const probPercent = (probabilidade * 100).toFixed(1);

            // Elementos de UI
            const resultBox = document.getElementById('resultBox');
            const classText = document.getElementById('classification');
            const probText = document.getElementById('probabilidade');
            const aviso = document.getElementById('aviso');

            // Resetar estilos anteriores
            resultBox.classList.remove('hidden', 'border-pink-300', 'border-blue-300', 'border-yellow-400', 'bg-pink-50', 'bg-blue-50', 'bg-yellow-50');
            aviso.classList.add('hidden');
            aviso.classList.remove('bg-yellow-200', 'text-yellow-800');

            // Aplicar Zonas de Decisão Clínica Atualizadas (45% e 55%)
            if (probabilidade < 0.45) {
                // FÊMEA (< 45%)
                resultBox.classList.add('border-pink-300', 'bg-pink-50');
                classText.textContent = "FÊMEA";
                classText.className = "text-3xl font-black mb-2 text-pink-700";
                probText.textContent = probPercent + "%";
                probText.className = "font-bold text-lg text-pink-700";
            } else if (probabilidade > 0.55) {
                // MACHO (> 55%)
                resultBox.classList.add('border-blue-300', 'bg-blue-50');
                classText.textContent = "MACHO";
                classText.className = "text-3xl font-black mb-2 text-blue-700";
                probText.textContent = probPercent + "%";
                probText.className = "font-bold text-lg text-blue-700";
            } else {
                // INCONCLUSIVO (45% - 55%)
                resultBox.classList.add('border-yellow-400', 'bg-yellow-50');
                classText.textContent = "INCONCLUSIVO";
                classText.className = "text-3xl font-black mb-2 text-yellow-700";
                probText.textContent = probPercent + "%";
                probText.className = "font-bold text-lg text-yellow-700";
                
                aviso.textContent = "⚠️ Animal na zona de sobreposição fenotípica (45-55%). Recomendado uso de método complementar (DNA/Necropsia).";
                aviso.classList.remove('hidden');
                aviso.classList.add('bg-yellow-200', 'text-yellow-800');
            }
        }
    </script>
</body>
</html>
